<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ curso.titulo }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #1a1a2e;
  --paper:  #fafaf8;
  --cream:  #f0ede6;
  --rule:   #ddd8ce;
  --accent: #e63946;
  --accent2:#457b9d;
  --gold:   #f4a261;
  --muted:  #6b6b80;
  --white:  #ffffff;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:var(--paper); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; font-size:15px; line-height:1.7; }
a { color:inherit; text-decoration:none; }

/* NAV */
nav {
  background:var(--ink);
  padding:0 40px;
  display:flex;
  align-items:center;
  height:56px;
  gap:20px;
  position:sticky;
  top:0;
  z-index:100;
}
.nav-logo {
  display:flex;
  align-items:center;
  gap:10px;
}
.nav-logo img { height:32px; border-radius:4px; }
.nav-logo span {
  font-family:'Playfair Display',serif;
  font-size:14px;
  color:white;
  letter-spacing:0.02em;
}
.nav-links {
  margin-left:auto;
  display:flex;
  gap:24px;
}
.nav-links a {
  font-size:12px;
  color:rgba(255,255,255,0.6);
  letter-spacing:0.06em;
  text-transform:uppercase;
  transition:color 0.15s;
}
.nav-links a:hover { color:white; }
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="/static/img/11_Utilitaria.png" alt="logo">
    <span>{{ curso.titulo }}</span>
  </div>
  <div class="nav-links">
    <a href="/">Inicio</a>
    <a href="/#modulos">Módulos</a>
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
